default:
  module: src.server.tasks.dbbench.DBBenchTask
  parameters:
    concurrency: 32
    max_round: 15

    harness:
      enabled: false        # set to true in env_train split
      h2: true              # action gate + SQL rewrite + commit gate + answer normalisation
      h3: true              # tool/prompt static hints + schema card
      h4: true              # post-step monitor + budget warn/force
      h5: true              # skill library + step guidance
      h5_top_k: 3
      h2_repeat_sql_block_after: 2
      h4_stall_window: 3
      h4_empty_threshold: 2
      h4_budget_warn_threshold: 3
      h4_budget_force_threshold: 2
      h5_hint_max_words: 40

    tools:
      - type: "function"
        function:
          name: "execute_sql"
          description: "Executes a given SQL statement on the database and returns the result."
          parameters:
            type: "object"
            properties:
              query:
                type: "string"
                description: "The SQL query to be executed."
            required:
              - "query"
            additionalProperties: False
      - type: "function"
        function:
          name: "commit_final_answer"
          description: "Commits the final answer after all operations are completed."
          parameters:
            type: "object"
            properties:
              answers:
                type: "array"
                items:
                  type: "string"
                description: "The list of final answers to commit."
            required:
              - "answers"
            additionalProperties: False

    env_driver: docker
    env_options:
      network_name: dbbench_default
      state_driver: redis
      state_options:
        connection:
          host: 172.17.0.1

dbbench-std:
  parameters:
    name: dbbench-std
    data_file: "data/dbbench/standard.jsonl"
    harness:
      enabled: true
      h5_top_k: 3

dbbench-env_train:
  parameters:
    name: dbbench-env_train
    data_file: "data/dbbench/db_out_new.jsonl"
    db_file: "data/dbbench/db_train"
    shuffle_seed: 45
    # Adjust this number to control train-set sampling size.
    sample_size: 100
    harness:
      enabled: true
      h5_top_k: 3
      h2: true              # action gate + SQL rewrite + commit gate + answer normalisation
      h3: true              # tool/prompt static hints + schema card
      h4: true              # post-step monitor + budget warn/force
      h5: true              # skill library + step guidance
